{% extends 'base.html' %}

{% block content %}
<div class="dashboard-wrapper editorial-layout">

    <main class="dashboard-content">
        <div class="container animate-in">

            <div class="location-header" style="margin-top: 2rem; margin-bottom: 2rem; text-align: center;">
                <h1 style="font-family: 'Outfit', sans-serif; color: var(--text-main);">Live Location</h1>
                <p style="color: var(--text-secondary);">View your current position on the map</p>
            </div>

            <div class="map-container"
                style="position: relative; width: 100%; height: 600px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div id="map" style="width: 100%; height: 100%;"></div>

                <!-- Loading Overlay -->
                <div id="map-loading"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-light); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;">
                    <div class="spinner"
                        style="width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;">
                    </div>
                    <p style="margin-top: 1rem; color: var(--text-secondary);">Acquiring location...</p>
                </div>

                <!-- Error Overlay -->
                <div id="map-error"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-light); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
                    <p id="error-message" style="color: var(--text-secondary); max-width: 80%; text-align: center;"></p>
                    <button onclick="window.location.reload()" class="btn btn-primary"
                        style="margin-top: 1rem;">Retry</button>
                </div>
            </div>

            <div style="margin-top: 2rem; text-align: center;">
                <a href="/profile" class="btn btn-outline">Back to Settings</a>
            </div>
        </div>

        <style>
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }
        </style>

        <script>
            function initMap() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const pos = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude,
                            };

                            const map = new google.maps.Map(document.getElementById("map"), {
                                zoom: 15,
                                center: pos,
                                styles: [
                                    {
                                        "featureType": "all",
                                        "elementType": "geometry.fill",
                                        "stylers": [{ "weight": "2.00" }]
                                    },
                                    {
                                        "featureType": "all",
                                        "elementType": "geometry.stroke",
                                        "stylers": [{ "color": "#9c9c9c" }]
                                    },
                                    {
                                        "featureType": "all",
                                        "elementType": "labels.text",
                                        "stylers": [{ "visibility": "on" }]
                                    },
                                    {
                                        "featureType": "landscape",
                                        "elementType": "all",
                                        "stylers": [{ "color": "#f2f2f2" }]
                                    },
                                    {
                                        "featureType": "landscape",
                                        "elementType": "geometry.fill",
                                        "stylers": [{ "color": "#ffffff" }]
                                    },
                                    {
                                        "featureType": "landscape.man_made",
                                        "elementType": "geometry.fill",
                                        "stylers": [{ "color": "#ffffff" }]
                                    },
                                    {
                                        "featureType": "poi",
                                        "elementType": "all",
                                        "stylers": [{ "visibility": "off" }]
                                    },
                                    {
                                        "featureType": "road",
                                        "elementType": "all",
                                        "stylers": [{ "saturation": -100 }, { "lightness": 45 }]
                                    },
                                    {
                                        "featureType": "road",
                                        "elementType": "geometry.fill",
                                        "stylers": [{ "color": "#eeeeee" }]
                                    },
                                    {
                                        "featureType": "road",
                                        "elementType": "labels.text.fill",
                                        "stylers": [{ "color": "#7b7b7b" }]
                                    },
                                    {
                                        "featureType": "road",
                                        "elementType": "labels.text.stroke",
                                        "stylers": [{ "color": "#ffffff" }]
                                    },
                                    {
                                        "featureType": "water",
                                        "elementType": "all",
                                        "stylers": [{ "color": "#46bcec" }, { "visibility": "on" }]
                                    },
                                    {
                                        "featureType": "water",
                                        "elementType": "geometry.fill",
                                        "stylers": [{ "color": "#c8d7d4" }]
                                    },
                                    {
                                        "featureType": "water",
                                        "elementType": "labels.text.fill",
                                        "stylers": [{ "color": "#070707" }]
                                    },
                                    {
                                        "featureType": "water",
                                        "elementType": "labels.text.stroke",
                                        "stylers": [{ "color": "#ffffff" }]
                                    }
                                ]
                            });

                            new google.maps.Marker({
                                position: pos,
                                map: map,
                                title: "You are here",
                                animation: google.maps.Animation.DROP
                            });

                            document.getElementById('map-loading').style.display = 'none';
                        },
                        (error) => {
                            handleLocationError(true, error);
                        }
                    );
                } else {
                    // Browser doesn't support Geolocation
                    handleLocationError(false);
                }
            }

            function handleLocationError(browserHasGeolocation, error) {
                document.getElementById('map-loading').style.display = 'none';
                const errorOverlay = document.getElementById('map-error');
                const errorMessage = document.getElementById('error-message');

                errorOverlay.style.display = 'flex';

                if (browserHasGeolocation && error) {
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage.textContent = "User denied the request for Geolocation.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage.textContent = "Location information is unavailable.";
                            break;
                        case error.TIMEOUT:
                            errorMessage.textContent = "The request to get user location timed out.";
                            break;
                        default:
                            errorMessage.textContent = "An unknown error occurred.";
                            break;
                    }
                } else {
                    errorMessage.textContent = browserHasGeolocation
                        ? "Error: The Geolocation service failed."
                        : "Error: Your browser doesn't support geolocation.";
                }
            }
        </script>

</div>
</main>
</div>

<!-- Google Maps API - REPLACE YOUR_API_KEY_HERE with a valid key -->
<script async defer
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"></script>
{% endblock %}
