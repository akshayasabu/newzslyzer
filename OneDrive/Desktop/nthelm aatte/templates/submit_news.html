{% extends "reporter_layout.html" %}

{% block content %}
<div class="container animate-in" style="max-width: 800px; padding-bottom: 4rem;">
    <div class="auth-header" style="text-align: center; margin: 2rem 0;">
        <h1 class="auth-title">Submit Local News</h1>
        <p class="auth-subtitle">Share what's happening around you. Tag the exact location.</p>
    </div>

    <form action="/submit-news" method="POST" enctype="multipart/form-data" class="auth-form"
        style="background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">

        <!-- Title -->
        <div class="form-group">
            <label for="title">Headline</label>
            <input type="text" id="title" name="title" class="form-input"
                placeholder="e.g. New Park Opening in Downtown" required>
        </div>

        <!-- Category -->
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" class="form-input">
                <option value="Local" selected>Local News</option>
                <option value="Technology">Technology</option>
                <option value="Sports">Sports</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Lifestyle">Lifestyle</option>
            </select>
        </div>

        <!-- Content -->
        <div class="form-group">
            <label for="content">Story Details</label>
            <textarea id="content" name="content" class="form-input" rows="6"
                placeholder="Write your full story here..." required style="resize: vertical;"></textarea>
        </div>

        <!-- Image Upload -->
        <div class="form-group">
            <label for="image">Cover Image</label>
            <input type="file" id="image" name="image" class="form-input" accept="image/*" required>
        </div>

        <!-- Location Picker Removed -->

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 2rem;">Submit News</button>
    </form>
</div>






{% endblock %}
