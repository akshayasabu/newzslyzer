{% extends 'base.html' %}

{% block content %}
<div class="container animate-in" style="max-width: 500px; margin: 4rem auto;">
    <div class="auth-box">
        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">Choose a strong new password for your account.</p>

        <form method="POST" action="/reset-password/{{ token }}" class="auth-form">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 special" required
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&_#\-.])[A-Za-z\d@$!%*?&_#\-.]{8,}$">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm your new password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
